<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE ALERTA DE SEGURIDAD</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            margin: 0 auto;
        }
        h1 {
            color: #f85149;
            font-size: 42px;
            margin-bottom: 10px;
        }
        h2 {
            color: #58a6ff;
            font-size: 24px;
            margin-top: 0;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
            color: #8b949e;
        }
        .joke-image {
            font-size: 100px;
            margin: 20px 0;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }
        .btn {
            display: inline-block;
            background-color: #238636;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 25px;
        }
        .btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="joke-image">🤡</div>
    <h1>¡CAÍSTE REDONDITO!</h1>
    <h2>Alerta de Inocencia Nivel Máximo</h2>
    <p>Tus datos están completamente a salvo... pero tu dignidad acaba de sufrir un hackeo masivo por confiar demasiado.</p>
    <p>¡No te preocupes! Envía esta captura al grupo para ver quién más cae.</p>
    <a href="https://wa.me/" class="btn">Volver a WhatsApp</a>
</div>

</body>
</html>
